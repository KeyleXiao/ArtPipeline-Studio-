# 在 GitHub 云端 Windows 环境打包 .exe
# 仓库根布局: artApp/ + tools/（ArtPipeline-Studio 标准结构）

name: Build Windows Release

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "artApp/**"
      - "tools/**"
      - ".github/workflows/build-windows.yml"
      - "ArtPipeline/artApp/**"
      - "ArtPipeline/tools/**"

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Resolve project paths
        id: paths
        run: |
          set -euo pipefail
          if [ -d artApp ] && [ -d tools ]; then
            ARTAPP=artApp
            TOOLS=tools
          elif [ -d ArtPipeline/artApp ] && [ -d ArtPipeline/tools ]; then
            ARTAPP=ArtPipeline/artApp
            TOOLS=ArtPipeline/tools
          else
            echo "::error::找不到 artApp 与 tools 目录（期望仓库根为 artApp + tools 并列）"
            ls -la
            exit 1
          fi
          echo "artapp=$ARTAPP" >> "$GITHUB_OUTPUT"
          echo "tools=$TOOLS" >> "$GITHUB_OUTPUT"
          echo "Resolved artApp=$ARTAPP tools=$TOOLS"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            ${{ steps.paths.outputs.artapp }}/requirements.txt
            ${{ steps.paths.outputs.artapp }}/requirements-build.txt

      - name: Verify layout
        run: |
          test -f "${{ steps.paths.outputs.artapp }}/run_app.py"
          test -f "${{ steps.paths.outputs.artapp }}/build_release_win.py"
          test -f "${{ steps.paths.outputs.tools }}/config_manager.py"
          echo "✓ artApp 与 tools 路径正确"

      - name: Prepare build venv
        working-directory: ${{ steps.paths.outputs.artapp }}
        run: python build_release_win.py --setup-venv

      - name: Build with PyInstaller
        working-directory: ${{ steps.paths.outputs.artapp }}
        run: .build-venv/Scripts/python.exe build_release_win.py

      - name: List release output
        if: always()
        run: |
          ls -la "${{ steps.paths.outputs.artapp }}/release/" || true
          ls -la "${{ steps.paths.outputs.artapp }}/release/ArtPipeline Studio/" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArtPipeline-Studio-Windows
          path: ${{ steps.paths.outputs.artapp }}/release/ArtPipeline Studio/
          if-no-files-found: error
